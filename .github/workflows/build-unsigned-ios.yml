name: Build unsigned iOS IPA and Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create
        required: false
        default: unsigned-ios-latest
  push:
    tags:
      - 'unsigned-ios-*'

permissions:
  contents: write

jobs:
  build-unsigned-ios:
    name: Build unsigned IPA
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          cache: true

      - name: Show tool versions
        run: |
          flutter --version
          xcodebuild -version
          ruby --version

      - name: Get Flutter packages
        run: flutter pub get

      - name: Patch iOS plugins for runner Xcode SDK
        run: |
          set -euo pipefail
          CONNECTIVITY_FILE="$HOME/.pub-cache/hosted/pub.dev/connectivity_plus-7.1.1/ios/connectivity_plus/Sources/connectivity_plus/PathMonitorConnectivityProvider.swift"
          if [ -f "$CONNECTIVITY_FILE" ]; then
            perl -0pi -e 's/path\.isUltraConstrained/false/g' "$CONNECTIVITY_FILE"
            grep -n "isUltraConstrained\|false" "$CONNECTIVITY_FILE" || true
          fi
          DEVICE_INFO_FILE="$HOME/.pub-cache/hosted/pub.dev/device_info_plus-12.4.0/ios/device_info_plus/Sources/device_info_plus/FPPDeviceInfoPlusPlugin.m"
          if [ -f "$DEVICE_INFO_FILE" ]; then
            perl -0pi -e 's/\[NSProcessInfo processInfo\]\.isiOSAppOnVision/NO/g; s/\[info isiOSAppOnVision\]/NO/g' "$DEVICE_INFO_FILE"
            grep -n "isiOSAppOnVision\|NO" "$DEVICE_INFO_FILE" || true
          fi

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Patch CocoaPods for runner Xcode SDK
        run: |
          set -euo pipefail
          CROP_FILE="ios/Pods/TOCropViewController/Objective-C/TOCropViewController/TOCropViewController.m"
          if [ -f "$CROP_FILE" ]; then
            perl -ni -e 'print unless /UIViewLayoutRegion|layoutRegion|edgeInsetsForLayoutRegion/' "$CROP_FILE"
            perl -0pi -e 's/edgeInsets\.top/self.view.safeAreaInsets.top/g; s/edgeInsets\.left/self.view.safeAreaInsets.left/g; s/edgeInsets\.right/self.view.safeAreaInsets.right/g; s/edgeInsets\.bottom/self.view.safeAreaInsets.bottom/g' "$CROP_FILE"
            grep -n "UIViewLayoutRegion\|layoutRegion\|edgeInsetsForLayoutRegion" "$CROP_FILE" || true
          fi
      - name: Build Flutter iOS assets
        run: flutter build ios --release --no-codesign --config-only

      - name: Build iOS app without code signing
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios/xcode-derived \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            build
          mkdir -p build/ios/iphoneos
          APP_PATH=$(find build/ios/xcode-derived/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app produced by xcodebuild"
            exit 1
          fi
          rm -rf build/ios/iphoneos/Runner.app
          cp -R "$APP_PATH" build/ios/iphoneos/Runner.app

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH="build/ios/iphoneos/Runner.app"
          IPA_DIR="build/ios/unsigned-ipa"
          if [ ! -d "$APP_PATH" ]; then
            echo "Runner.app not found at $APP_PATH"
            exit 1
          fi
          rm -rf "$IPA_DIR"
          mkdir -p "$IPA_DIR/Payload"
          cp -R "$APP_PATH" "$IPA_DIR/Payload/Runner.app"
          cd "$IPA_DIR"
          zip -qry PiliPlus-unsigned.ipa Payload
          shasum -a 256 PiliPlus-unsigned.ipa > PiliPlus-unsigned.ipa.sha256
          ls -lh PiliPlus-unsigned.ipa PiliPlus-unsigned.ipa.sha256

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PiliPlus-unsigned-ipa
          path: |
            build/ios/unsigned-ipa/PiliPlus-unsigned.ipa
            build/ios/unsigned-ipa/PiliPlus-unsigned.ipa.sha256
          if-no-files-found: error

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: PiliPlus unsigned iOS IPA
          body: |
            Unsigned iOS IPA built by GitHub Actions.

            This IPA is not code signed and usually requires re-signing before installation on a normal iPhone.
          files: |
            build/ios/unsigned-ipa/PiliPlus-unsigned.ipa
            build/ios/unsigned-ipa/PiliPlus-unsigned.ipa.sha256
